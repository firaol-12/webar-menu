<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Food Menu</title>
  <link rel="stylesheet" href="stylet.css">
  <!-- <link rel="stylesheet" href="./dist/output.css"> -->
  <!-- <script src="https://cdn.tailwindcss.com"></script> -->

  <!-- MindAR -->
  <script src="./libs/mindar/mindar-image-three.prod.js"></script>
  <!-- Main JS -->
  <script type="module" src="./main.js"></script>

    <style>
      html, body {position: relative; margin: 0; width: 100%; height: 100%; overflow: hidden}
 
  #container {
	width: 100vw;
	height: 100vh;
	position: relative;
	overflow: hidden;
      }

    #scanning {
	display: flex;
	align-items: center;
	justify-content: center;
	position: absolute;
	left: 0;
	right: 0;
	top: 0;
	bottom: 0;
	background: transparent;
	z-index: 2;
      }
      @media (min-aspect-ratio: 1/1) {
	#scanning .inner {
	  width: 50vh;
	  height: 50vh;
	}
      }
      @media (max-aspect-ratio: 1/1) {
	#scanning .inner {
	  width: 80vw;
	  height: 80vw;
	}
      }

      #scanning .inner {
	display: flex;
	align-items: center;
	justify-content: center;
	position: relative;

	background:
	  linear-gradient(to right, white 10px, transparent 10px) 0 0,
	  linear-gradient(to right, white 10px, transparent 10px) 0 100%,
	  linear-gradient(to left, white 10px, transparent 10px) 100% 0,
	  linear-gradient(to left, white 10px, transparent 10px) 100% 100%,
	  linear-gradient(to bottom, white 10px, transparent 10px) 0 0,
	  linear-gradient(to bottom, white 10px, transparent 10px) 100% 0,
	  linear-gradient(to top, white 10px, transparent 10px) 0 100%,
	  linear-gradient(to top, white 10px, transparent 10px) 100% 100%;
	background-repeat: no-repeat;
	background-size: 40px 40px;
      }

      #scanning.hidden {
	display: none;
      }

      #scanning img {
	opacity: 0.6;
	width: 90%;
	align-self: center;
      }

      #scanning .inner .scanline {
	position: absolute;
	width: 100%;
	height: 10px;
	background: white;
	animation: move 2s linear infinite;
      }

      @keyframes move {
	0%, 100% { top: 0% }
	50% { top: calc(100% - 10px) }
      } 
    </style>
</head>

<body>

  <!-- SCANNING UI -->
  <div id="scanning">
    <div class="inner">
      <img src="./assets/restaurant logo (Edited).jpg" alt="">
      <div class="scanline"></div>
    </div>
  </div>

  <!-- MAIN CONTAINER (MindAR ROOT)  -->
   <div id="container"> 

    <div class="container ar-element">

      <div class="left-container ar-element" id="left-container">

        <!-- Categories -->
        <div id="categories" class="ar-element">
          <button class="category-btn all" id="all">All</button>
          <button class="category-btn breakfast" id="breakfast">Breakfast</button>
          <button class="category-btn" id="lunch">Lunch</button>
          <button class="category-btn" id="dinner">Dinner</button>
          <button class="category-btn" id="fasting">Vegan</button>
          <div class="show-order">
            <button class="order-btn" id="order-list">
                <img class="order-img" src="./assets/food.png" alt="">
                <span id="order-nbr">0</span>
            </button>
          </div>
        </div>


        <!-- 3D View -->
        <div id="view3d" class="ar-element">
          <div class="arrow-div1 left">
            <button class="arrow-btn" id="prevBtn">
              <img class="arrow-icon" src="./assets/previous.png" alt="">
            </button>
          </div>
          <div class="arrow-div2 right">
            <button class="arrow-btn" id="nextBtn">
              <img class="arrow-icon" src="./assets/next.png" alt="">
            </button>
          </div>
        </div>

        <!-- Order Section -->
        <div id="orderSection" class="order-land">
          <!-- <button class="order-now land" id="order-btn">Order Now</button> -->
        </div>

        <!-- Cart Panel -->
        <div id="cart-panel" class="cart-panel hidden ar-element">
          <div class="cart-header">
            <div><h3 class="h3">Your Orders</h3></div>
            <button class="menu-cancel-btn" id="back-menu-btn"><img class="img-menu" src="./assets/cancel.png" alt=""></button>
          </div> 

          <div class="cart-body">
            <ul id="cart-items"></ul>
          </div>

          <div class="cart-total">
            <strong>Total:</strong>
            <span id="cart-total-price">0 ETB</span>
          </div>
        </div>

      </div>

      <!-- Food List -->
      <div id="foodList" class="ar-element food-container">
        <div class="cancel">
          <button id="cancel" class="menu-cancel-btn"><img class="img-cancel"  src="./assets/cancel.png" alt=""></button>
        </div>
        <div class="title order-port">
             <h3 class="food-list">Food List</h3>
        </div>
        <div class="menu-items" id="full-item">
          <div id="nameContainer"></div>
          <div id="priceContainer"></div>
        </div>

        <!-- <div class="order-sec">
          <button class="order-now port" id="order-btn">Order Now</button>
        </div> -->
      </div>

      <div class="menu-icon">
        <button  id="menu-icon-btn" class="menu-icon-btn"><img class="img-menu-icon" src="./assets/food-menu.png" alt=""></button>
      </div>

      <div class="mini-container">
      <div id="lower" class="lower">
          <div class="frist">
            <div><h3 class="text">price</h3></div>
            <div><span id="lower-price">0 birr</span></div>
          </div>

          <div class="middle">
            <div><h3 id="lower-name" class="text">Special Burger</h3></div>
            <div class="order">
              <button class="order-now port" id="order-btn">Order Now</button>
            </div>

          </div>

          <div class="last">
            <div><h3 class="text">calorie</h3></div>
            <div><span id="lower-calorie">0</span></div>
          </div>
      </div>
      

    </div>
  </div>
</div>

</body>
</html>
